# Production stack — single AWS box, HTTPS via nginx + Let's Encrypt (certbot).
#
#   internet ──443/80──▶ nginx (TLS, streaming-safe) ──▶ app (uvicorn :8077)
#                                                         worker (ingest + daemons)
#                                                         db (postgres 17)
#                          certbot (auto-renews the cert every 12h)
#
# You do NOT run this by hand. Run:  sudo bash install.sh
# The installer generates .env.prod + deploy/nginx.active.conf, obtains the
# certificate, and brings everything up. See install.sh.

services:
  db:
    image: postgres:17
    command: ["postgres", "-c", "max_connections=${PG_MAX_CONNECTIONS:-200}"]
    # read POSTGRES_* straight from .env.prod so the DB password ALWAYS matches
    # what the app connects with (an `environment:` block with ${VAR:-default}
    # would fall back to 'docsensei' at initdb and break auth forever).
    env_file: .env.prod
    volumes:
      - docsensei_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docsensei} -d ${POSTGRES_DB:-docsensei}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      args:
        BUILD_SHA: ${BUILD_SHA:-prod}
        BUILD_DATE: ${BUILD_DATE:-}
    image: cityagentdocsensei-app
    # --proxy-headers + --forwarded-allow-ips so the app trusts nginx's
    # X-Forwarded-Proto (https) when it builds share/OIDC absolute URLs.
    command: ["sh", "-c", "uvicorn app.main:app --host 0.0.0.0 --port 8077 --proxy-headers --forwarded-allow-ips='*' --workers ${WEB_CONCURRENCY:-4}"]
    env_file: .env.prod
    expose:
      - "8077"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./documents:/app/documents
    restart: unless-stopped

  # dedicated ingest worker (leader-gated daemons run here)
  worker:
    image: cityagentdocsensei-app
    command: ["python", "-m", "app.worker_main"]
    env_file: .env.prod
    environment:
      VISION_WORKERS: ${WORKER_VISION_WORKERS:-12}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./documents:/app/documents
    restart: unless-stopped

  # TLS terminator + reverse proxy. Config file is generated by install.sh into
  # deploy/nginx.active.conf (http-only for cert bootstrap, then full HTTPS).
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.active.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - app
    restart: unless-stopped

  # obtains + auto-renews the Let's Encrypt cert; reloads nginx on renewal
  certbot:
    image: certbot/certbot:latest
    entrypoint: >
      sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet;
             sleep 12h & wait $${!}; done"
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    restart: unless-stopped

volumes:
  docsensei_pg:
  certbot_www:
  certbot_conf:
