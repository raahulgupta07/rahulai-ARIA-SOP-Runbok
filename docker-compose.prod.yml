# Production / horizontal-scale stack.
#
#   nginx (TLS + load balance)  →  N stateless app replicas  →  Postgres + S3
#                                  1 worker (ingest + daemons, leader-gated)
#
# The app is stateless (JWT auth; rate-limit + OIDC state live in Postgres), so you
# can run many app replicas behind nginx. The PG advisory leader-lock guarantees
# only ONE replica runs the background daemons (dream cycle, ingest worker, watcher).
#
# Usage:
#   1. cp .env.prod.example .env.prod    # fill in secrets + S3 + (optional) managed DB
#   2. docker compose -f docker-compose.prod.yml build
#   3. docker compose -f docker-compose.prod.yml up -d --scale app=3
#   4. scale up/down live:  docker compose -f docker-compose.prod.yml up -d --scale app=5
#
# NOTE: page images must be SHARED across replicas. Single host (compose --scale) can
# share the ./data bind mount below. Multi-host (Swarm/k8s) → set STORAGE=s3 in
# .env.prod so all replicas read/write images from object storage.

services:
  db:
    # For real production prefer a MANAGED Postgres (RDS / Cloud SQL) and point
    # DATABASE_URL at it in .env.prod — then you can delete this service.
    image: postgres:17
    command: ["postgres", "-c", "max_connections=${PG_MAX_CONNECTIONS:-200}"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-docsensei}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docsensei}
      POSTGRES_DB: ${POSTGRES_DB:-docsensei}
    volumes:
      - docsensei_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docsensei} -d ${POSTGRES_DB:-docsensei}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      args:
        BUILD_SHA: ${BUILD_SHA:-prod}
        BUILD_DATE: ${BUILD_DATE:-}
    image: cityagentdocsensei-app
    # NO container_name / NO host ports → so `--scale app=N` can spin up N copies.
    command: ["sh", "-c", "uvicorn app.main:app --host 0.0.0.0 --port 8077 --workers ${WEB_CONCURRENCY:-4}"]
    env_file: .env.prod
    expose:
      - "8077"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data            # single-host: replicas share images here. Multi-host → S3.
      - ./documents:/app/documents
    restart: unless-stopped

  # one dedicated ingest worker (leader-gated daemons run here, not in the API replicas)
  worker:
    image: cityagentdocsensei-app
    command: ["python", "-m", "app.worker_main"]
    env_file: .env.prod
    environment:
      VISION_WORKERS: ${WORKER_VISION_WORKERS:-12}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./documents:/app/documents
    restart: unless-stopped

  # load balancer: terminates HTTP(S) + round-robins across the app replicas
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      # - "443:443"               # uncomment + mount certs for TLS (unlocks PWA install)
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./deploy/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  docsensei_pg:
