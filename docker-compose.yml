services:
  db:
    image: postgres:17
    container_name: docsensei-db
    environment:
      POSTGRES_USER: docsensei
      POSTGRES_PASSWORD: docsensei
      POSTGRES_DB: docsensei
    ports:
      - "5436:5432"
    volumes:
      - docsensei_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docsensei -d docsensei"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      args:
        BUILD_SHA: ${BUILD_SHA:-local}
        BUILD_DATE: ${BUILD_DATE:-}
    container_name: docsensei-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://docsensei:docsensei@db:5432/docsensei
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      INGEST_MODEL: ${INGEST_MODEL:-openrouter/google/gemini-3.1-flash-lite}
      CHAT_MODEL: ${CHAT_MODEL:-google/gemini-3.1-flash-lite}
      API_KEY: ${API_KEY:-}
      RETRIEVE_EXPAND: ${RETRIEVE_EXPAND:-1}
      RETRIEVE_K: ${RETRIEVE_K:-6}
      RETRIEVE_DEPTH: ${RETRIEVE_DEPTH:-5}
      RETRIEVE_RERANK: ${RETRIEVE_RERANK:-1}
      RERANK_POOL: ${RERANK_POOL:-12}
      COMPILE_ON_INGEST: ${COMPILE_ON_INGEST:-0}
      CHAT_USE_WIKI: ${CHAT_USE_WIKI:-0}
      COMPILE_MODEL: ${COMPILE_MODEL:-}
      AUTO_CATEGORIZE: ${AUTO_CATEGORIZE:-1}
      VISION_PREREAD: ${VISION_PREREAD:-1}
      VISION_WORKERS: ${VISION_WORKERS:-6}
      # ---- auth / runtime ----
      APP_ENV: ${APP_ENV:-dev}
      JWT_SECRET: ${JWT_SECRET:-dev-docsensei-change-me}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-}
      LOGIN_MAX_FAIL: ${LOGIN_MAX_FAIL:-5}
      LOGIN_LOCK_MIN: ${LOGIN_LOCK_MIN:-15}
      # ---- external alerting (warn/error → webhook; empty = off) ----
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
      ALERT_COOLDOWN_SEC: ${ALERT_COOLDOWN_SEC:-300}
      # ---- embeddable widget ----
      EMBED_TOKEN_TTL_MIN: ${EMBED_TOKEN_TTL_MIN:-30}
      EMBED_PRUNE_ENABLED: ${EMBED_PRUNE_ENABLED:-0}
      EMBED_VISITOR_TTL_DAYS: ${EMBED_VISITOR_TTL_DAYS:-90}
      EMBED_EVENT_TTL_DAYS: ${EMBED_EVENT_TTL_DAYS:-60}
      EMBED_PRUNE_INTERVAL_H: ${EMBED_PRUNE_INTERVAL_H:-24}
      # ---- analytics / accuracy daemons (default OFF) ----
      VERIFY_ENABLED: ${VERIFY_ENABLED:-0}
      VERIFY_FLAG_THRESHOLD: ${VERIFY_FLAG_THRESHOLD:-70}
      USAGE_ROLLUP_ENABLED: ${USAGE_ROLLUP_ENABLED:-1}
      # ---- DB retention / vacuum (default OFF) ----
      DB_MAINTENANCE_ENABLED: ${DB_MAINTENANCE_ENABLED:-0}
      DB_SESSION_TTL_DAYS: ${DB_SESSION_TTL_DAYS:-30}
      DB_MAINTENANCE_INTERVAL_H: ${DB_MAINTENANCE_INTERVAL_H:-24}
      # ---- auto-learning Layer B (default OFF) ----
      AUTO_LEARN_ENABLED: ${AUTO_LEARN_ENABLED:-1}
      AUTO_LEARN_MODE: ${AUTO_LEARN_MODE:-per_answer}
      AUTO_LEARN_MIN_CONF: ${AUTO_LEARN_MIN_CONF:-0.7}
      AUTO_APPROVE_MIN_CONF: ${AUTO_APPROVE_MIN_CONF:-0.95}
      AUTO_LEARN_MAX_PER_CONV: ${AUTO_LEARN_MAX_PER_CONV:-5}
      AUTO_FACTS_ENABLED: ${AUTO_FACTS_ENABLED:-1}
      AUTO_FACTS_MAX: ${AUTO_FACTS_MAX:-6}
      # ---- auto complexity routing ----
      AUTO_ROUTE_ENABLED: ${AUTO_ROUTE_ENABLED:-1}
      AUTO_ROUTE_LLM: ${AUTO_ROUTE_LLM:-1}
      # ---- agentic iterative retrieval ----
      AGENTIC_RETRIEVE_ENABLED: ${AGENTIC_RETRIEVE_ENABLED:-1}
      AGENTIC_MAX_SUBS: ${AGENTIC_MAX_SUBS:-3}
      # ---- AI admin/ops agent ----
      OPS_AGENT_ENABLED: ${OPS_AGENT_ENABLED:-1}
      # ---- shareable answer links ----
      SHARE_ENABLED: ${SHARE_ENABLED:-1}
      SHARE_PUBLIC_ENABLED: ${SHARE_PUBLIC_ENABLED:-0}
      DATA_DIR: ./data
      PAGES_DIR: ./data/pages
      UPLOADS_DIR: ./data/uploads
      IMPORT_DIR: ${IMPORT_DIR:-./documents}   # "Import from server" scans this folder
    ports:
      - "8081:8077"
    extra_hosts:
      # lets the app container reach the throwaway Keycloak on the SAME url the
      # browser uses (kc.local:8088 → host published port). Split-horizon fix.
      - "kc.local:host-gateway"
    volumes:
      - ./data:/app/data        # page images + uploads persist on host
      - ./documents:/app/documents   # drop SOPs here → "Import from server" queues them

volumes:
  docsensei_pg:
