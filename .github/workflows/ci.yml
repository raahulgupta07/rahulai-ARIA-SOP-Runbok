name: CI

on:
  push:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: docsensei
          POSTGRES_PASSWORD: docsensei
          POSTGRES_DB: docsensei_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U docsensei"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15
    env:
      DATABASE_URL: postgresql://docsensei:docsensei@localhost:5432/docsensei_test
      OPENROUTER_API_KEY: test-key-unused
      JWT_SECRET: test-secret-not-for-production-use-only-32c
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements-dev.txt
      - name: Run pytest
        run: python -m pytest tests/ -q

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build SPA
        run: |
          cd frontend
          npm ci
          npm run build
