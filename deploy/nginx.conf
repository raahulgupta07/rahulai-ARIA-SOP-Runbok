# Load-balances across all `app` replicas. Docker's embedded DNS (127.0.0.11)
# returns every replica's IP for the service name `app`; the resolver + variable
# below force nginx to re-resolve at request time so new replicas from
# `--scale app=N` are picked up without a reload.

server {
    listen 80;
    server_name _;

    # large SOP uploads
    client_max_body_size 64m;

    # streaming chat (/api/ask/stream is NDJSON, server-sent) must not be buffered
    location /api/ask/stream {
        resolver 127.0.0.11 valid=10s;
        set $upstream app:8077;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        resolver 127.0.0.11 valid=10s;
        set $upstream app:8077;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

